<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GLOBETIME — Time Zone Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #08090b;
    --panel: rgba(15,17,20,0.72);
    --panel-solid: #0d0f12;
    --line: #1b2026;
    --line-strong: #262d35;
    --text: #e8ebee;
    --muted: #757f89;
    --faint: #444c55;
    --accent: #5ad1e6;
    --accent-dim: rgba(90,209,230,0.18);
    --grid: 0.5;
    --font-ui: "IBM Plex Sans", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  #root { position: fixed; inset: 0; }

  /* texture layers */
  .tex {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
  }
  .tex-grid {
    background-image:
      linear-gradient(rgba(120,140,160,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,140,160,0.05) 1px, transparent 1px);
    background-size: 46px 46px, 46px 46px;
    opacity: var(--grid);
    mask-image: radial-gradient(ellipse 80% 80% at 42% 50%, #000 30%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 42% 50%, #000 30%, transparent 90%);
  }
  .tex-vignette {
    background: radial-gradient(ellipse 75% 75% at 42% 46%, transparent 40%, rgba(0,0,0,0.55) 100%);
  }
  .tex-scan {
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.014) 0 1px, transparent 1px 3px);
    opacity: calc(var(--grid) * 0.8);
  }

  #globe-wrap {
    position: fixed; inset: 0 var(--sidebar-w, 372px) 0 0; z-index: 2;
  }
  #globe { width: 100%; height: 100%; display: block; cursor: grab; }
  #globe:active { cursor: grabbing; }

  .corner-mark { position: absolute; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--faint); pointer-events: none; }

  /* micro label */
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .hairline { height: 1px; background: var(--line); }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #20262d; border-radius: 0; }
  ::-webkit-scrollbar-track { background: transparent; }

  input { font-family: inherit; }
  button { font-family: inherit; cursor: pointer; }
</style>
</head>
<body>
  <div class="tex tex-grid"></div>
  <div class="tex tex-scan"></div>
  <link href="styles.css" rel="stylesheet" />
  <div id="globe-wrap"><canvas id="globe"></canvas></div>
  <div class="tex tex-vignette"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="data/cities.js"></script>
  <script src="data/timeutil.js"></script>
  <script src="globe.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
